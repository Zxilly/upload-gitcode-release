name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run lint

      - run: pnpm run build

      - name: Create release commit and update tags
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          # Validate tag format
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([._-].*)?$ ]]; then
            echo "::error::Invalid tag format: $TAG"
            exit 1
          fi

          # Verify build output exists
          test -f dist/index.js || { echo "::error::Build did not produce dist/index.js"; exit 1; }

          # Configure git for the commit
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Force-add dist (ignored by .gitignore)
          git add -f dist/

          # Create a dangling commit (not on any branch) containing full tree + dist
          TREE=$(git write-tree)
          COMMIT=$(git commit-tree "$TREE" -p HEAD -m "release: build dist for $TAG")

          # Move the release tag to the new commit
          git tag -f "$TAG" "$COMMIT"
          git push -f origin "refs/tags/$TAG"

          # Update major version tag (e.g., v1.2.3 -> v1)
          MAJOR=$(echo "$TAG" | grep -oE '^v[0-9]+' || true)
          if [ -n "$MAJOR" ]; then
            git tag -f "$MAJOR" "$COMMIT"
            git push -f origin "refs/tags/$MAJOR"
          fi
